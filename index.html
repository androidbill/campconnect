function ensureData(d){if(!d||!Array.isArray(d.campgrounds))return seed();if(!Array.isArray(d.ownerAudit))d.ownerAudit=[];if(!d.owner)d.owner={username:"owner",pin:"0000"};if(!Array.isArray(d.owners)||!d.owners.length)d.owners=[{username:d.owner.username||"owner",pin:d.owner.pin||"0000",active:true}];d.owners=d.owners.map(o=>({username:o.username||"owner",pin:pin(o.pin)||"0000",active:o.active!==false}));d.owner=d.owners[0];d.campgrounds.forEach(c=>{c.announcement=String(c.announcement||"");c.services=Array.isArray(c.services)&&c.services.length?c.services:defaultServices();c.services=c.services.map(s=>({id:s.id||id(),name:String(s.name||"Service"),icon:String(s.icon||"🔧"),active:s.active!==false}));c.campers=Array.isArray(c.campers)?c.campers:[];c.campers=c.campers.map(x=>({...x,serviceDisabled:x.serviceDisabled===true}));c.requests=Array.isArray(c.requests)?c.requests:[];c.staff=Array.isArray(c.staff)?c.staff:[];c.admins=Array.isArray(c.admins)?c.admins:[];c.audit=Array.isArray(c.audit)?c.audit:[];c.siteCount=c.siteCount||400;const used=new Set(c.campers.map(x=>x.pin).filter(Boolean));for(let i=1;i<=c.siteCount;i++)if(!c.campers.some(x=>x.site===i))c.campers.push({site:i,name:"Site "+i,pin:randomPin(used),active:true,serviceDisabled:false});c.campers.sort((a,b)=>a.site-b.site)});return ensureMetaForData(d)}

  // SAFETY: no whole-state Firebase writes anymore.
  // Local saves stay local; individual actions call safeSetDoc/safeSoftDeleteDoc.

async function safeSetDoc(ref, data, label){
  if(!firebaseReady||!remoteLoaded||!remoteWriteEnabled||!db)return false;
  const next={...data};
  return db.runTransaction(async tx=>{
    const snap=await tx.get(ref);
    const remote=snap.exists?snap.data():null;
    const localVersion=Number(next.version||0);
    const remoteVersion=Number(remote?.version||0);

    if(remote&&localVersion&&remoteVersion&&localVersion<remoteVersion){
      throw new Error(`Version conflict while saving ${label||ref.path}`);
    }

    next.version=Math.max(localVersion,remoteVersion)+1;
    next.lastUpdatedAt=Date.now();
    next.lastUpdatedBy=actor?.username||actor?.name||"System";
    tx.set(ref,next,{merge:true});
  }).then(()=>true).catch(err=>{
    console.error(err);
    toast("Save conflict or Firebase write failed. Refresh and try again.");
    return false;
  });
}
async function safeSoftDeleteDoc(ref, data, label){

function mergeArrayById(existing,incoming,keyFn){
  const map=new Map();
  (existing||[]).forEach(x=>map.set(String(keyFn(x)),x));
  (incoming||[]).forEach(x=>{
    const k=String(keyFn(x));
    const old=map.get(k);
    if(!old||Number(x.lastUpdatedAt||0)>=Number(old.lastUpdatedAt||0))map.set(k,x);
  });
  return Array.from(map.values());
}

  if(ownerAuditSnap)ownerAuditSnap.forEach(d=>next.ownerAudit.push(d.data()));
  const cgSnap=await rootColl("campgrounds").collection("items").where("active","==",true).get();
  for(const doc of cgSnap.docs){
    const c={...doc.data(),campers:[],requests:[],staff:[],admins:[],services:[],audit:[]};
    for(const coll of ["campers","requests","staff","admins","services","audit"]){
      const snap=await campgroundDoc(c.id).collection(coll).where("active","==",true).get().catch(()=>null);
      if(snap)snap.forEach(d=>c[coll].push(d.data()));
    }
    next.campgrounds.push(c);
  }
  if(!next.owners.length&&!next.campgrounds.length)return null;
  return ensureData(next);
}
async function startFirebaseSync(){
  if(!window.firebase)return toast("Firebase did not load. Using this device cache.");
  try{
    firebase.initializeApp(firebaseConfig);
    try{await firebase.firestore().enablePersistence({synchronizeTabs:true})}catch{}
    db=firebase.firestore();
    await firebase.auth().signInAnonymously();
    firebaseReady=true;

    const loaded=await loadCollectionsState();
    if(loaded){
      applyingRemote=true;
      state=loaded;
      saveLocalOnly();
      applyingRemote=false;
      remoteLoaded=true;
      remoteWriteEnabled=true;
      if(!getCg()&&state.campgrounds.length)campgroundId=state.campgrounds[0].id;
      if(role!=="home"&&!restoreSession())setRole("home");else render();
      return;
    }

    // SAFETY: never create Firebase from seed() or localStorage.
    remoteLoaded=false;
    remoteWriteEnabled=false;
    toast("No Firebase data found. Remote writes disabled to protect data.");
  }catch(e){
    console.error(e);
    toast("Firebase sync failed. Using this device cache.");
  }
}

function adminAnalyticsTab(){let cg=getCg(), open=openRequests(cg), closed=cg.requests.filter(r=>r.status==="closed"), today=closed.filter(r=>(r.closedDate||r.date)===dateKey()), byCloser=groupCount(closed,r=>r.completedBy||"Unknown"), bySvc=groupCount(cg.requests,r=>r.service), busiest=groupCount(cg.requests,r=>"Site "+r.site);return`<section class="card grid"><h3>Analytics</h3><button class="btn2" data-action="export-analytics">Export Analytics CSV</button><div class="statGrid"><div class="stat"><b>${today.length}</b><p class="tiny">Completed Today</p></div><div class="stat"><b>${open.length}</b><p class="tiny">Open Now</p></div><div class="stat"><b>${closed.length}</b><p class="tiny">Completed Total</p></div><div class="stat"><b>${cg.requests.length}</b><p class="tiny">All Requests</p></div></div></section><section class="card grid"><h3>Top Closers</h3>${bars(byCloser)}</section><section class="card grid"><h3>Top Services</h3>${bars(bySvc)}</section><section class="card grid"><h3>Busiest Sites</h3>${bars(busiest.slice(0,10))}</section>`}
function adminAuditSearchTab(){return`<section class="card grid"><h3>Audit Filter</h3><div class="grid2"><div class="field"><label>Site #</label><input id="adminAuditSite" inputmode="numeric" placeholder="Example: 12"></div><div class="field"><label>Action</label><input id="adminAuditAction" placeholder="Example: PIN, request, login"></div><div class="field"><label>Who</label><input id="adminAuditActor" placeholder="Staff/Admin name"></div><div class="field"><label>Details</label><input id="adminAuditDetails" placeholder="Any detail text"></div></div><button data-action="admin-audit-filter">Filter Audit</button><div id="adminAuditResult">${auditSearchResults({})}</div></section>`}
function auditIncludes(value,term){return String(value||"").toLowerCase().includes(String(term||"").trim().toLowerCase())}
function auditMatches(a,f){let site=String(f.site||"").trim(), action=String(f.action||"").trim(), actor=String(f.actor||"").trim(), details=String(f.details||"").trim();if(site){let re=new RegExp(`\\bsite\\s*#?\\s*${site}\\b|\\b${site}\\b`,"i");if(!re.test([a.action,a.details].join(" ")))return false}if(action&&!auditIncludes(a.action,action))return false;if(actor&&!auditIncludes(a.actor,actor))return false;if(details&&!auditIncludes(a.details,details))return false;return true}
function auditSearchResults(filters){let cg=getCg(), f=filters||{}, active=[f.site&&`site ${f.site}`,f.action&&`action ${f.action}`,f.actor&&`who ${f.actor}`,f.details&&`details ${f.details}`].filter(Boolean), rows=cg.audit.filter(a=>auditMatches(a,f)).slice(0,75), label=active.length?`${rows.length} match${rows.length===1?"":"es"} for ${esc(active.join(", "))}`:`Latest ${Math.min(75,cg.audit.length)} audit actions`;return`<div class="soft"><b>${label}</b><p class="tiny">Filters can be used alone or together.</p></div>${rows.length?rows.map(auditResultRow).join(""):`<div class="soft tiny">No audit actions found.</div>`}`}
function auditResultRow(a){return`<div class="soft grid"><div class="split"><b>${esc(a.action)}</b><span class="tiny">${esc(a.at)}</span></div><p class="tiny">By: <b>${esc(a.actor||"Unknown")}</b></p><p class="tiny">${esc(a.details||"")}</p></div>`}
function groupCount(items,getter){let out={};items.forEach(x=>{let k=getter(x)||"Unknown";out[k]=(out[k]||0)+1});return Object.entries(out).sort((a,b)=>b[1]-a[1])}
function bars(rows){let max=Math.max(1,...rows.map(x=>x[1]));return rows.length?rows.map(([n,c])=>`<div class="soft"><div class="split"><b>${esc(n)}</b><span>${c}</span></div><div style="height:7px;background:#e5eee8;border-radius:999px;overflow:hidden;margin-top:6px"><div style="height:100%;width:${Math.max(4,Math.round(c/max*100))}%;background:#0f9f6e"></div></div></div>`).join(""):`<p class="tiny">No data yet.</p>`}

function siteDetailsHtml(siteNumber){let cg=getCg(), camper=cg.campers.find(c=>c.site===siteNumber), hist=cg.requests.filter(r=>r.site===siteNumber);if(!camper)return`<div class="soft">Site not found.</div>`;let svcDisabled=camper.serviceDisabled===true;return`<div class="soft grid"><h3>Site ${camper.site}</h3><div class="card"><div class="split"><div><b>${esc(camper.name)}</b><p class="tiny">PIN: <b>${esc(camper.pin)}</b></p></div><span class="badge ${svcDisabled?"canceled":"open"}">${svcDisabled?"Requests Disabled":"Requests Enabled"}</span></div>${role==="admin"?`<div class="grid"><div class="field"><label>Name</label><input id="editSiteName" maxlength="20" value="${esc(camper.name)}"></div><div class="field"><label>PIN</label><input id="editSitePin" inputmode="numeric" maxlength="4" value="${esc(camper.pin)}"></div><div class="row"><button class="btn2" data-action="save-site" data-site="${camper.site}">Save Name/PIN</button><button class="btn2" data-action="reset-name" data-site="${camper.site}">Reset Name</button><button class="danger" data-action="reset-pin" data-site="${camper.site}">Reset PIN</button><button class="${svcDisabled?"good":"warn"}" data-action="toggle-site-requests" data-site="${camper.site}">${svcDisabled?"Enable Requests":"Disable Requests"}</button></div></div>`:""}</div><h3>Service History</h3>${hist.length?hist.map(requestHistoryCard).join(""):`<div class="soft tiny">No service history.</div>`}</div>`}
function adminSearchSite(){q("adminSiteResult").innerHTML=siteDetailsHtml(Number(q("adminSiteLookup").value))}
function staffSearchSite(){q("staffSiteResult").innerHTML=siteDetailsHtml(Number(q("staffSiteLookup").value))}
function staffPinSearchSite(){q("staffPinSiteResult").innerHTML=staffPinResetResult(Number(q("staffPinSiteLookup").value))}
function adminAuditSearch(){let filters={site:q("adminAuditSite")?.value||"",action:q("adminAuditAction")?.value||"",actor:q("adminAuditActor")?.value||"",details:q("adminAuditDetails")?.value||""};q("adminAuditResult").innerHTML=auditSearchResults(filters)}

function assignRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid), who=actor?.username||"Staff";if(!r)return alert("Request not found.");if(r.status!=="open")return alert("Only open requests can be assigned.");if(r.assignedTo)return toast(`Already assigned to ${r.assignedTo}`);r.assignedTo=who;r.assignedAt=now();let line=assignmentLine(who);r.notes=r.notes?`${r.notes}\n${line}`:line;stampRecord(r);audit("Assigned request",`${r.service} / site ${r.site} / ${who}`);save();syncRequest(cg.id,r);toast("Request assigned");role==="admin"?renderAdmin():renderStaff()}
function completeRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="closed";r.closedAt=now();r.closedDate=dateKey();r.completedBy=actor?.username||"Staff";stampRecord(r);audit("Completed request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}staffRequestId=null;save();role==="admin"?renderAdmin():renderStaff()}
function cancelRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="canceled";r.closedAt=now();r.closedDate=dateKey();r.completedBy=actor?.username||"Staff";stampRecord(r);audit("Canceled request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}staffRequestId=null;save();role==="admin"?renderAdmin():renderStaff()}
function reopenRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="open";r.reopenedAt=now();r.reopenedBy=actor?.username||"Staff";delete r.closedAt;delete r.closedDate;delete r.completedBy;stampRecord(r);audit("Reopened request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}save();toast("Ticket reopened");role==="admin"?renderAdmin():renderStaff()}
function updateRequestNotes(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(!r)return alert("Request not found.");r.notes=q("staffRequestNotes")?.value.trim()||"";stampRecord(r);audit("Updated request notes",`${r.service} / site ${r.site}`);save();syncRequest(cg.id,r);toast("Notes updated");role==="admin"?renderAdmin():renderStaff()}
function staffSavePin(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber), p=pin(q("staffResetPin")?.value);if(!c)return alert("Site not found.");if(p.length!==4)return alert("4 digit PIN required.");c.pin=p;stampRecord(c);audit("Staff reset camper PIN",`Site ${siteNumber}: ${c.name}`);save();syncCampgroundSub(cg.id,"campers",c);toast("PIN updated");staffPinSearchSite()}
function saveAnnouncement(){let cg=getCg();cg.announcement=q("adminAnnouncement")?.value||"";stampRecord(cg);audit("Updated announcement",cg.announcement?cg.announcement.slice(0,80):"Cleared");save();syncCampground(cg);toast("Announcement updated");renderAdmin()}
function clearAnnouncement(){let cg=getCg();cg.announcement="";stampRecord(cg);audit("Updated announcement","Cleared");save();syncCampground(cg);toast("Announcement cleared");renderAdmin()}
function saveSite(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber), name=q("editSiteName")?.value.trim(), p=pin(q("editSitePin")?.value);if(!name||p.length!==4)return alert("Name and 4 digit PIN required.");if(!validCamperName(name))return;c.name=name;c.pin=p;stampRecord(c);audit("Updated site account",`Site ${siteNumber}: ${name}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function resetSitePin(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);c.pin=randomPin(new Set(cg.campers.filter(x=>x.site!==siteNumber).map(x=>x.pin)));stampRecord(c);audit("Reset site PIN",`Site ${siteNumber}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function resetSiteName(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);c.name="Site "+siteNumber;stampRecord(c);cg.requests.forEach(r=>{if(r.site===siteNumber){r.name=c.name;stampRecord(r);syncRequest(cg.id,r)}});audit("Reset site name",`Site ${siteNumber}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function toggleSiteRequests(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);if(!c)return alert("Site not found.");c.serviceDisabled=!c.serviceDisabled;stampRecord(c);audit(c.serviceDisabled?"Disabled site requests":"Enabled site requests",`Site ${siteNumber}: ${c.name}`);save();syncCampgroundSub(cg.id,"campers",c);toast(c.serviceDisabled?"Service requests disabled":"Service requests enabled");adminSearchSite()}
function addStaff(){let cg=getCg(), u=q("newStaffUser").value.trim(), p=pin(q("newStaffPin").value);if(!u||p.length!==4)return alert("Username and PIN required.");if(cg.staff.some(s=>norm(s.username)===norm(u)))return alert("Username exists.");let staff=ensureRecordMeta({id:id(),username:u,pin:p,active:true});cg.staff.push(staff);audit("Added staff",u);save();syncCampgroundSub(cg.id,"staff",staff);renderAdmin()}
function activeServiceCount(){return getCg().services.filter(s=>s.active).length}
function addService(){let cg=getCg(), name=q("newServiceName").value.trim(), icon=(q("newServiceIcon").value.trim()||"🔧");if(!name)return alert("Service name required.");if(cg.services.some(s=>norm(s.name)===norm(name)))return alert("Service already exists.");let service=ensureRecordMeta({id:id(),name,icon,active:true});cg.services.push(service);audit("Added service",name);save();syncCampgroundSub(cg.id,"services",service);toast("Service added");renderAdmin()}
function setServiceIcon(targetId,icon){let el=q(targetId), btn=q(targetId+"Btn");if(el){el.value=icon;if(btn)btn.textContent=icon;closeIconPicker()}}
function saveService(i){let cg=getCg(), s=cg.services[Number(i)], name=q("serviceName"+i)?.value.trim(), icon=q("serviceIcon"+i)?.value.trim()||"🔧";if(!s)return;if(!name)return alert("Service name required.");if(cg.services.some((x,idx)=>idx!==Number(i)&&norm(x.name)===norm(name)))return alert("Service already exists.");let old=s.name;s.name=name;s.icon=icon;stampRecord(s);if(selectedService===old)selectedService=name;audit("Updated service",`${old} -> ${name}`);save();syncCampgroundSub(cg.id,"services",s);toast("Service updated");renderAdmin()}
function toggleService(i){let s=getCg().services[Number(i)];if(!s)return;if(s.active&&activeServiceCount()<=1)return alert("Keep at least one active service.");s.active=!s.active;stampRecord(s);if(!s.active&&selectedService===s.name)selectedService="";audit(s.active?"Enabled service":"Disabled service",s.name);save();syncCampgroundSub(getCg().id,"services",s);renderAdmin()}
function deleteService(i){let cg=getCg(), s=cg.services[Number(i)];if(!s)return;if(s.active&&activeServiceCount()<=1)return alert("Keep at least one active service.");if(!confirm(`Delete service ${s.name}? Existing request history will keep its service name.`))return;softDeleteRecord(s);syncCampgroundSub(cg.id,"services",s);cg.services.splice(Number(i),1);if(selectedService===s.name)selectedService="";audit("Deleted service",s.name);saveLocalOnly();toast("Service deleted");renderAdmin()}
function addAdmin(){let cg=getCg(), u=q("newAdminUser").value.trim(), p=pin(q("newAdminPin").value);if(!u||p.length!==4)return alert("Username and PIN required.");if(cg.admins.some(a=>norm(a.username)===norm(u)))return alert("Username exists.");let admin=ensureRecordMeta({id:id(),username:u,pin:p,active:true});cg.admins.push(admin);audit("Added admin",u);save();syncCampgroundSub(cg.id,"admins",admin);renderAdmin()}
function toggleStaff(i){let s=getCg().staff[Number(i)];s.active=!s.active;stampRecord(s);audit(s.active?"Enabled staff":"Disabled staff",s.username);save();syncCampgroundSub(getCg().id,"staff",s);renderAdmin()}
function deleteStaff(i){let cg=getCg(), s=cg.staff[Number(i)];softDeleteRecord(s);syncCampgroundSub(cg.id,"staff",s);cg.staff.splice(Number(i),1);audit("Deleted staff",s.username);saveLocalOnly();renderAdmin()}
function activeAdminCount(){return getCg().admins.filter(a=>a.active).length}
function toggleAdmin(i){let a=getCg().admins[Number(i)];if(a.active&&activeAdminCount()<=1)return alert("Keep at least one active admin.");a.active=!a.active;stampRecord(a);audit(a.active?"Enabled admin":"Disabled admin",a.username);save();syncCampgroundSub(getCg().id,"admins",a);renderAdmin()}
function deleteAdmin(i){let cg=getCg(), a=cg.admins[Number(i)];if(a.active&&activeAdminCount()<=1)return alert("Keep at least one active admin.");softDeleteRecord(a);syncCampgroundSub(cg.id,"admins",a);cg.admins.splice(Number(i),1);audit("Deleted admin",a.username);saveLocalOnly();renderAdmin()}

function renderOwner(){app.innerHTML=`<section class="card"><h3>Owner</h3><p class="tiny">Add and manage campgrounds. Campground admins and staff only see their assigned campground.</p></section><div class="tabs"><button class="tab ${ownerTab==="campgrounds"?"active":""}" data-action="owner-tab" data-tab="campgrounds">Campgrounds</button><button class="tab ${ownerTab==="owners"?"active":""}" data-action="owner-tab" data-tab="owners">Owners</button><button class="tab ${ownerTab==="exports"?"active":""}" data-action="owner-tab" data-tab="exports">Exports</button></div>${ownerTab==="campgrounds"?ownerCampgroundsTab():ownerTab==="owners"?ownerAccountsTab():ownerExportsTab()}`}
function ownerCampgroundsTab(){return`<section class="card grid"><h3>Add Campground</h3><input id="newCgName" placeholder="Campground name"><input id="newCgSites" inputmode="numeric" placeholder="Number of sites, e.g. 400"><button data-action="add-campground">Add Campground</button>${state.campgrounds.map(ownerCampgroundRow).join("")}</section>`}
function ownerCampgroundRow(c){return`<div class="soft grid"><div class="split"><b>${esc(c.name)}</b><button class="danger" data-action="delete-campground" data-id="${esc(c.id)}" style="width:auto">Remove</button></div><p class="tiny">${c.siteCount} sites · ${c.admins.length} admins · ${c.staff.length} staff · ${c.requests.length} requests</p><div class="grid2"><div class="field"><label>Site Count</label><input id="ownerSiteCount-${esc(c.id)}" inputmode="numeric" value="${esc(c.siteCount)}"></div><div class="field"><label>&nbsp;</label><button class="btn2" data-action="owner-update-sites" data-id="${esc(c.id)}">Update Sites</button></div></div><div class="grid2"><div class="field"><label>Admin Username</label><input id="ownerAdminUser-${esc(c.id)}" placeholder="${c.admins.length?"Add another admin":"First admin username"}"></div><div class="field"><label>4 Digit PIN</label><input id="ownerAdminPin-${esc(c.id)}" inputmode="numeric" maxlength="4"></div></div><button class="btn2" data-action="owner-add-admin" data-id="${esc(c.id)}">${c.admins.length?"Add Admin":"Add First Admin"}</button>${c.admins.length?`<p class="tiny">Admins: ${c.admins.map(a=>esc(a.username)).join(", ")}</p>`:`<p class="tiny">No admin yet. Add one so this campground can be managed.</p>`}</div>`}
function ownerAccountsTab(){return`<section class="card grid"><h3>Add Owner</h3><div class="field"><label>Username</label><input id="newOwnerUser" placeholder="owner username"></div><div class="field"><label>4 Digit PIN</label><input id="newOwnerPin" inputmode="numeric" maxlength="4"></div><button data-action="add-owner">Add Owner</button>${state.owners.map((o,i)=>`<div class="soft grid"><div class="split"><b>${esc(o.username)}</b><span class="badge ${o.active?"open":"closed"}">${o.active?"Active":"Disabled"}</span></div><div class="field"><label>PIN</label><input id="ownerPin${i}" inputmode="numeric" maxlength="4" value="${esc(o.pin)}"></div><div class="row"><button class="btn2" data-action="save-owner-pin" data-index="${i}">Save PIN</button><button class="btn2" data-action="toggle-owner" data-index="${i}">${o.active?"Disable":"Enable"}</button><button class="danger" data-action="delete-owner" data-index="${i}">Delete</button></div></div>`).join("")}</section>`}
function ownerExportsTab(){return`<section class="card grid"><h3>Exports</h3><button class="btn2" data-action="export-owner-summary">Export All Campgrounds Summary CSV</button><button class="btn2" data-action="export-owner-audit">Export Owner Audit CSV</button></section>`}
function addCampground(){let name=q("newCgName").value.trim(), sites=Number(q("newCgSites").value)||400;if(!name)return alert("Campground name required.");if(state.campgrounds.some(c=>norm(c.name)===norm(name)))return alert("Campground already exists.");let cg=makeCampground(name,sites);state.campgrounds.push(cg);ownerAudit("Added campground",`${name} / ${sites} sites`);save();syncCampground(cg);toast("Campground added");renderOwner()}
function deleteCampground(cgId){if(state.campgrounds.length<=1)return alert("Keep at least one campground.");let cg=state.campgrounds.find(c=>c.id===cgId);if(!cg)return;if(!confirm(`Remove ${cg.name}? This deletes its sites, staff, admins, requests, and audit log from this device.`))return;ownerAudit("Soft-deleted campground",`${cg.name} / ${cg.siteCount} sites / ${cg.requests.length} requests`);softDeleteRecord(cg);syncCampground(cg);state.campgrounds=state.campgrounds.filter(c=>c.id!==cgId);if(campgroundId===cgId)campgroundId=null;saveLocalOnly();toast("Campground removed");renderOwner()}
function ownerUpdateSites(cgId){let cg=state.campgrounds.find(c=>c.id===cgId), next=Math.floor(Number(q("ownerSiteCount-"+cgId)?.value));if(!cg)return;if(!next||next<1)return alert("Enter at least 1 site.");let old=cg.siteCount;if(next===old)return toast("Site count unchanged");if(next<old&&!confirm(`Reduce ${cg.name} from ${old} sites to ${next}? Sites ${next+1} through ${old} will be removed.`))return;let used=new Set(cg.campers.map(x=>x.pin).filter(Boolean));if(next>old){for(let i=old+1;i<=next;i++)if(!cg.campers.some(x=>x.site===i))cg.campers.push({site:i,name:"Site "+i,pin:randomPin(used),active:true})}else{cg.campers=cg.campers.filter(c=>c.site<=next);cg.requests=cg.requests.filter(r=>Number(r.site)<=next)}cg.siteCount=next;cg.campers.sort((a,b)=>a.site-b.site);cg.audit.unshift({id:id(),at:now(),actor:actor?.username||"Owner",action:"Updated site count",details:`${old} -> ${next}`});ownerAudit("Updated campground site count",`${cg.name}: ${old} -> ${next}`);save();toast("Site count updated");renderOwner()}
function ownerAddAdmin(cgId){let cg=state.campgrounds.find(c=>c.id===cgId), u=q("ownerAdminUser-"+cgId)?.value.trim(), p=pin(q("ownerAdminPin-"+cgId)?.value);if(!cg)return;if(!u||p.length!==4)return alert("Admin username and 4 digit PIN required.");if(cg.admins.some(a=>norm(a.username)===norm(u)))return alert("Admin username exists for this campground.");cg.admins.push({username:u,pin:p,active:true});cg.audit.unshift({id:id(),at:now(),actor:actor?.username||"Owner",action:"Added admin",details:u});ownerAudit("Owner added campground admin",`${cg.name} / ${u}`);save();toast(cg.admins.length===1?"First admin added":"Admin added");renderOwner()}
function activeOwnerCount(){return state.owners.filter(o=>o.active).length}
function addOwner(){let u=q("newOwnerUser").value.trim(), p=pin(q("newOwnerPin").value);if(!u||p.length!==4)return alert("Username and 4 digit PIN required.");if(state.owners.some(o=>norm(o.username)===norm(u)))return alert("Owner username exists.");state.owners.push({username:u,pin:p,active:true});ownerAudit("Added owner",u);save();toast("Owner added");renderOwner()}
function saveOwnerPin(i){let o=state.owners[Number(i)], p=pin(q("ownerPin"+i)?.value);if(!o||p.length!==4)return alert("4 digit PIN required.");o.pin=p;stampRecord(o);ownerAudit("Updated owner PIN",o.username);save();syncOwner(o);toast("Owner PIN updated");renderOwner()}
function toggleOwner(i){let o=state.owners[Number(i)];if(!o)return;if(o.active&&activeOwnerCount()<=1)return alert("Keep at least one active owner.");o.active=!o.active;ownerAudit(o.active?"Enabled owner":"Disabled owner",o.username);save();toast(o.active?"Owner enabled":"Owner disabled");renderOwner()}
function deleteOwner(i){let o=state.owners[Number(i)];if(!o)return;if(o.active&&activeOwnerCount()<=1)return alert("Keep at least one active owner.");if(actor&&norm(actor.username)===norm(o.username))return alert("You cannot delete the owner account you are using.");ownerAudit("Deleted owner",o.username);state.owners.splice(Number(i),1);state.owner=state.owners[0];save();toast("Owner deleted");renderOwner()}
function exportOwnerSummary(){ownerAudit("Exported owner summary","All campgrounds summary CSV");let rows=[["Campground","Sites","Open Requests","Total Requests","Admins","Staff"]];state.campgrounds.forEach(c=>rows.push([c.name,c.siteCount,c.requests.filter(r=>r.status==="open").length,c.requests.length,c.admins.length,c.staff.length]));download("campconnect-all-campgrounds-summary.csv",csv(rows),"text/csv")}
function exportOwnerAudit(){let rows=[["Date","Actor","Role","Action","Details"],...state.ownerAudit.map(a=>[a.at,a.actor,a.role,a.action,a.details])];ownerAudit("Exported owner audit","Owner audit CSV");download("campconnect-owner-audit.csv",csv(rows),"text/csv")}

function exportAudit(){let cg=getCg(), rows=[["Date","Actor","Action","Details"],...cg.audit.map(a=>[a.at,a.actor,a.action,a.details])];ownerAudit("Exported campground audit",cg.name);download(`${cg.name}-audit.csv`,csv(rows),"text/csv")}
function exportSitePins(){let cg=getCg(), rows=[["Campground","Site Number","Camper Name","PIN","Active"],...cg.campers.map(c=>[cg.name,c.site,c.name,c.pin,c.active===false?"No":"Yes"])];ownerAudit("Exported site PINs",cg.name);download(`${cg.name}-site-pins.csv`,csv(rows),"text/csv")}
function exportAnalytics(){let cg=getCg(), rows=[["Campground","Section","Name","Value"],[cg.name,"Summary","Open Requests",openRequests(cg).length],[cg.name,"Summary","Total Requests",cg.requests.length],...groupCount(cg.requests,r=>r.service).map(x=>[cg.name,"Services",x[0],x[1]])];ownerAudit("Exported analytics",cg.name);download(`${cg.name}-analytics.csv`,csv(rows),"text/csv")}
function csv(rows){return rows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n")}
function download(name,content,type){let blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}

app.addEventListener("click",e=>{let target=e.target.closest("[data-action]");if(!target)return;let a=target.dataset.action;if(a==="camper-login")doCamperLogin();if(a==="staff-login")doStaffLogin();if(a==="admin-login")doAdminLogin();if(a==="owner-login")doOwnerLogin();if(a==="logout")setRole("home");if(a==="camper-tab"){camperTab=target.dataset.tab;saveSession();renderCamper();scrollTopNow()}if(a==="select-service"){selectedService=target.dataset.service;saveSession();renderCamper()}if(a==="submit-request")submitRequest();if(a==="save-camper-account")saveCamperAccount();if(a==="staff-tab"){staffTab=target.dataset.tab;staffRequestId=null;saveSession();role==="admin"?renderAdmin():renderStaff()}if(a==="admin-tab"){adminTab=target.dataset.tab;staffRequestId=null;saveSession();renderAdmin()}if(a==="admin-requests-back"){adminTab="sites";staffRequestId=null;saveSession();renderAdmin();scrollTopNow()}if(a==="owner-tab"){ownerTab=target.dataset.tab;saveSession();renderOwner()}if(a==="open-request"){staffRequestId=target.dataset.id;saveSession();role==="admin"?renderAdmin():renderStaff();scrollTopNow()}if(a==="back-requests"){staffRequestId=null;saveSession();role==="admin"?renderAdmin():renderStaff()}if(a==="assign-request")assignRequest(target.dataset.id);if(a==="update-request-notes")updateRequestNotes(target.dataset.id);if(a==="reopen-request")reopenRequest(target.dataset.id);if(a==="save-announcement")saveAnnouncement();if(a==="clear-announcement")clearAnnouncement();if(a==="staff-site-search")staffSearchSite();if(a==="staff-pin-site-search")staffPinSearchSite();if(a==="staff-save-pin")staffSavePin(Number(target.dataset.site));if(a==="admin-site-search")adminSearchSite();if(a==="admin-audit-filter")adminAuditSearch();if(a==="complete-request")completeRequest(target.dataset.id);if(a==="cancel-request")cancelRequest(target.dataset.id);if(a==="save-site")saveSite(Number(target.dataset.site));if(a==="reset-pin")resetSitePin(Number(target.dataset.site));if(a==="reset-name")resetSiteName(Number(target.dataset.site));if(a==="toggle-site-requests")toggleSiteRequests(Number(target.dataset.site));if(a==="add-staff")addStaff();if(a==="add-service")addService();if(a==="open-icon-picker")openIconPicker(target.dataset.target);if(a==="save-service")saveService(target.dataset.index);if(a==="toggle-service")toggleService(target.dataset.index);if(a==="delete-service")deleteService(target.dataset.index);if(a==="add-admin")addAdmin();if(a==="toggle-staff")toggleStaff(target.dataset.index);if(a==="delete-staff")deleteStaff(target.dataset.index);if(a==="toggle-admin")toggleAdmin(target.dataset.index);if(a==="delete-admin")deleteAdmin(target.dataset.index);if(a==="add-campground")addCampground();if(a==="delete-campground")deleteCampground(target.dataset.id);if(a==="owner-update-sites")ownerUpdateSites(target.dataset.id);if(a==="owner-add-admin")ownerAddAdmin(target.dataset.id);if(a==="add-owner")addOwner();if(a==="save-owner-pin")saveOwnerPin(target.dataset.index);if(a==="toggle-owner")toggleOwner(target.dataset.index);if(a==="delete-owner")deleteOwner(target.dataset.index);if(a==="export-owner-summary")exportOwnerSummary();if(a==="export-owner-audit")exportOwnerAudit();if(a==="export-audit")exportAudit();if(a==="export-site-pins")exportSitePins();if(a==="export-analytics")exportAnalytics()});
app.addEventListener("input",e=>{if(["pinInput","staffPin","adminPin","newOwnerPin","newStaffPin","newAdminPin","editSitePin","camperAccountPin","staffResetPin"].includes(e.target.id)||/^ownerPin\d+$/.test(e.target.id)||/^ownerAdminPin-/.test(e.target.id))e.target.value=pin(e.target.value)});
ownerLoginModal.addEventListener("input",e=>{if(e.target.id==="ownerPin")e.target.value=pin(e.target.value)});
function setupPWA(){if("serviceWorker"in navigator&&location.protocol!=="file:")navigator.serviceWorker.register("./service-worker.js").catch(()=>{});window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("installBar").classList.add("show")});document.getElementById("installBtn").onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}document.getElementById("installBar").classList.remove("show")};document.getElementById("dismissInstall").onclick=()=>document.getElementById("installBar").classList.remove("show")}
setupPWA();if(restoreSession())render();else renderHome();startFirebaseSync();
})();
</script>
