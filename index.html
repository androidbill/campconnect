async function safeSetDoc(ref, data, label, quiet=false){
  if(!firebaseReady||!remoteLoaded||!remoteWriteEnabled||!db)return false;
  const next={...data};
  return db.runTransaction(async tx=>{
    const snap=await tx.get(ref);
    const remote=snap.exists?snap.data():null;
    const localVersion=Number(next.version||0);
    const remoteVersion=Number(remote?.version||0);

    if(remote&&localVersion&&remoteVersion&&localVersion<remoteVersion){
      throw new Error(`Version conflict while saving ${label||ref.path}`);
    }

    next.version=Math.max(localVersion,remoteVersion)+1;
    next.lastUpdatedAt=Date.now();
    next.lastUpdatedBy=actor?.username||actor?.name||"System";
    tx.set(ref,next,{merge:true});
  }).then(()=>true).catch(err=>{
    console.error(err);
    if(!quiet)toast("Save conflict or Firebase write failed. Refresh and try again.");
    return false;
  });
}

function renderCamper(){let cg=getCg(), current=cg.campers.find(c=>c.site===actor.site)||actor, services=cg.services.filter(s=>s.active), history=cg.requests.filter(r=>r.site===actor.site).slice(0,20), disabled=current.serviceDisabled===true, openNow=serviceOpen(cg);if(disabled)selectedService="";if(selectedService&&!services.some(s=>s.name===selectedService))selectedService="";app.innerHTML=`<section class="card"><div><b>Site ${actor.site}</b><div class="tiny">${esc(actor.name)}</div><div class="chipRow">${disabled?`<span class="badge canceled">Service requests disabled</span>`:""}<span class="badge ${openNow?"open":"canceled"}">${openNow?"Service Hours Open":"After Hours"}</span></div></div></section><div class="tabs"><button class="tab ${camperTab==="request"?"active":""}" data-action="camper-tab" data-tab="request">Request</button><button class="tab ${camperTab==="history"?"active":""}" data-action="camper-tab" data-tab="history">History</button><button class="tab ${camperTab==="account"?"active":""}" data-action="camper-tab" data-tab="account">Account</button></div>${camperTab==="request"?disabled?`<section class="card"><h3>Request a Service</h3><p class="tiny">Service requests are currently disabled for this site. Please contact the campground office.</p></section>`:`<section class="card grid"><h3>Request a Service</h3>${services.length?`<div class="serviceGrid">${services.map(s=>`<button class="service ${selectedService===s.name?"selected":""}" data-action="select-service" data-service="${esc(s.name)}"><span>${esc(s.icon)}</span><b>${esc(s.name)}</b></button>`).join("")}</div>`:`<p class="tiny">No services are available right now.</p>`}<div class="field"><label>Priority</label><select id="requestPriority">${priorityOptions()}</select></div><div class="field"><label>Photo</label><input id="requestPhoto" type="file" accept="image/*"></div><div class="field"><label>Notes</label><textarea id="requestNotes" placeholder="Optional notes"></textarea></div><button data-action="submit-request" ${selectedService?"":"disabled"}>${selectedService?`Submit ${esc(selectedService)} Request`:"Select a Service"}</button>${announcementHtml(cg,actor.site)}</section>`:camperTab==="history"?`<section class="card"><h3>History</h3>${history.length?history.map(requestHistoryCard).join(""):`<p class="tiny">No requests yet.</p>`}</section>`:camperAccountTab()}`}
function camperAccountTab(){return`<section class="card grid"><h3>Account</h3><div class="soft"><b>Site ${actor.site}</b><p class="tiny">Update your name and login PIN.</p></div><div class="field"><label>Name</label><input id="camperAccountName" maxlength="20" value="${esc(actor.name)}" placeholder="Your name"></div><div class="field"><label>4 Digit PIN</label><input id="camperAccountPin" inputmode="numeric" maxlength="4" value="${esc(actor.pin)}"></div><button data-action="save-camper-account">Save Account</button></section>${camperThemeControls(actor.theme)}`}
function requestTime(r){let t=Number(r.createdMs||r.createdAtMs||0);if(t)return t;t=Date.parse(r.createdAt||"");return Number.isFinite(t)?t:0}
function requestHistoryCard(r){return`<div class="soft" style="margin-bottom:8px"><b>${esc(r.service)}</b> <span class="badge ${r.status==="open"?"open":r.status==="canceled"?"canceled":"closed"}">${esc(r.status)}</span> <span class="badge ${priorityClass(r.priority)}">${esc(r.priority||"Normal")}</span><p class="tiny">${esc(r.createdAt)}</p>${r.photo?`<img class="photoThumb" src="${esc(r.photo)}" alt="Request photo">`:""}${r.notes?`<div class="tiny">${esc(r.notes)}</div>`:""}</div>`}
function readPhotoFile(input){return new Promise(resolve=>{let f=input?.files?.[0];if(!f)return resolve({photo:"",photoName:""});if(f.size>900000)return resolve({error:"Photo is too large. Please choose a smaller image."});let r=new FileReader();r.onload=()=>resolve({photo:String(r.result||""),photoName:f.name});r.onerror=()=>resolve({error:"Could not read photo."});r.readAsDataURL(f)})}
async function submitRequest(){let cg=getCg(), current=cg.campers.find(c=>c.site===actor.site)||actor;if(current.serviceDisabled===true)return alert("Service requests are currently disabled for this site. Please contact the campground office.");if(!serviceOpen(cg))return alert(`Service requests are available from ${cg.serviceStart} to ${cg.serviceEnd}.`);if(!selectedService)return alert("Choose a service first.");let last=cg.requests.filter(r=>r.site===actor.site).map(requestTime).filter(Boolean).sort((a,b)=>b-a)[0]||0, waitMs=5*60*1000-(Date.now()-last);if(waitMs>0)return alert("You must wait at least 5 minutes before requesting another service.");let photo=await readPhotoFile(q("requestPhoto"));if(photo.error)return alert(photo.error);let req={id:id(),site:actor.site,name:actor.name,service:selectedService,priority:q("requestPriority")?.value||"Normal",photo:photo.photo,photoName:photo.photoName,notes:q("requestNotes")?.value.trim()||"",status:"open",assignedTo:"",assignedAt:"",createdAt:now(),createdMs:Date.now(),date:dateKey()};ensureRecordMeta(req);cg.requests.unshift(req);audit("Created request",`${req.priority} ${req.service} for site ${req.site}`);syncRequest(cg.id,req);selectedService="";toast("Request submitted");renderCamper()}
function saveCamperAccount(){let cg=getCg(), c=cg.campers.find(x=>x.site===actor.site), name=q("camperAccountName")?.value.trim(), p=pin(q("camperAccountPin")?.value);if(!c)return alert("Camper account not found.");if(!name||p.length!==4)return alert("Name and 4 digit PIN required.");if(!validCamperName(name))return;c.name=name;c.pin=p;actor=c;stampRecord(c);cg.requests.forEach(r=>{if(r.site===c.site){r.name=name;stampRecord(r);syncRequest(cg.id,r)}});audit("Updated camper account",`Site ${c.site}: ${name}`);save();syncCampgroundSub(cg.id,"campers",c);toast("Account updated");renderCamper()}
function saveCamperThemePack(index){if(index==="")return clearCamperTheme();let pack=THEME_PACKS[Number(index)], cg=getCg(), c=cg.campers.find(x=>x.site===actor.site);if(!pack||!c)return;c.theme=normalizeTheme(pack.colors);actor=c;stampRecord(c);audit("Updated camper theme",`Site ${c.site}: ${pack.name}`);save();syncCampgroundSub(cg.id,"campers",c);applyTheme(c);toast(`${pack.name} saved`)}

function sendTeamMessage(){let cg=getCg(), text=q("teamMessageText")?.value.trim();if(!cg||!["staff","admin"].includes(role))return;if(!text)return alert("Type a message first.");if(text.length>2000)return alert("Messages cannot exceed 2000 characters.");let msg=ensureRecordMeta({id:id(),actor:messageUser(),role,text,sentAt:now(),createdAtMs:Date.now(),active:true});cg.messages=Array.isArray(cg.messages)?cg.messages:[];cg.messages.push(msg);cg.messages.sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0));markMessagesRead(false);audit("Posted team message",`${msg.actor}: ${text.slice(0,120)}`);saveLocalOnly();syncMessage(cg.id,msg);toast("Message sent");role==="admin"?renderAdmin():renderStaff()}

function adminAuditSearchTab(){return`<section class="card grid"><h3>Audit Filter</h3><div class="grid2"><div class="field"><label>Site #</label><input id="adminAuditSite" inputmode="numeric" placeholder="Example: 12"></div><div class="field"><label>Action</label><input id="adminAuditAction" placeholder="Example: PIN, request, login"></div><div class="field"><label>Who</label><input id="adminAuditActor" placeholder="Staff/Admin name"></div><div class="field"><label>Details</label><input id="adminAuditDetails" placeholder="Any detail text"></div></div><button data-action="admin-audit-filter">Filter Audit</button><div id="adminAuditResult">${auditSearchResults({})}</div></section>`}
function auditIncludes(value,term){return String(value||"").toLowerCase().includes(String(term||"").trim().toLowerCase())}
function auditMatches(a,f){let site=String(f.site||"").trim(), action=String(f.action||"").trim(), actor=String(f.actor||"").trim(), details=String(f.details||"").trim();if(site){let re=new RegExp(`\\bsite\\s*#?\\s*${site}\\b|\\b${site}\\b`,"i");if(!re.test([a.action,a.details].join(" ")))return false}if(action&&!auditIncludes(a.action,action))return false;if(actor&&!auditIncludes(a.actor,actor))return false;if(details&&!auditIncludes(a.details,details))return false;return true}
function auditSearchResults(filters){let cg=getCg(), f=filters||{}, active=[f.site&&`site ${f.site}`,f.action&&`action ${f.action}`,f.actor&&`who ${f.actor}`,f.details&&`details ${f.details}`].filter(Boolean), rows=cg.audit.filter(a=>auditMatches(a,f)).slice(0,75), label=active.length?`${rows.length} match${rows.length===1?"":"es"} for ${esc(active.join(", "))}`:`Latest ${Math.min(75,cg.audit.length)} audit actions`;return`<div class="soft"><b>${label}</b><p class="tiny">Filters can be used alone or together.</p></div>${rows.length?rows.map(auditResultRow).join(""):`<div class="soft tiny">No audit actions found.</div>`}`}
function auditResultRow(a){return`<div class="soft grid"><div class="split"><b>${esc(a.action)}</b><span class="tiny">${esc(a.at)}</span></div><p class="tiny">By: <b>${esc(a.actor||"Unknown")}</b></p><p class="tiny">${esc(a.details||"")}</p></div>`}
function groupCount(items,getter){let out={};items.forEach(x=>{let k=getter(x)||"Unknown";out[k]=(out[k]||0)+1});return Object.entries(out).sort((a,b)=>b[1]-a[1])}
function bars(rows){let max=Math.max(1,...rows.map(x=>x[1]));return rows.length?rows.map(([n,c])=>`<div class="soft"><div class="split"><b>${esc(n)}</b><span>${c}</span></div><div style="height:7px;background:#e5eee8;border-radius:999px;overflow:hidden;margin-top:6px"><div style="height:100%;width:${Math.max(4,Math.round(c/max*100))}%;background:#0f9f6e"></div></div></div>`).join(""):`<p class="tiny">No data yet.</p>`}

function siteDetailsHtml(siteNumber){let cg=getCg(), camper=cg.campers.find(c=>c.site===siteNumber), hist=cg.requests.filter(r=>r.site===siteNumber);if(!camper)return`<div class="soft">Site not found.</div>`;let svcDisabled=camper.serviceDisabled===true;return`<div class="soft grid"><h3>Site ${camper.site}</h3><div class="card"><div class="split siteSummary"><div><b>${esc(camper.name)}</b><p class="tiny">PIN: <b>${esc(camper.pin)}</b></p></div><span class="badge ${svcDisabled?"canceled":"open"}">${svcDisabled?"Requests Disabled":"Requests Enabled"}</span></div>${role==="admin"?`<div class="grid"><div class="field"><label>Name</label><input id="editSiteName" maxlength="20" value="${esc(camper.name)}"></div><div class="field"><label>PIN</label><input id="editSitePin" inputmode="numeric" maxlength="4" value="${esc(camper.pin)}"></div><div class="siteActions"><button class="btn2" data-action="save-site" data-site="${camper.site}">Save Name/PIN</button><button class="btn2" data-action="reset-name" data-site="${camper.site}">Reset Name</button><button class="danger" data-action="reset-pin" data-site="${camper.site}">Reset PIN</button><button class="${svcDisabled?"good":"warn"}" data-action="toggle-site-requests" data-site="${camper.site}">${svcDisabled?"Enable Requests":"Disable Requests"}</button></div></div>`:""}</div><h3>Service History</h3>${hist.length?hist.map(requestHistoryCard).join(""):`<div class="soft tiny">No service history.</div>`}</div>`}
function adminSearchSite(){q("adminSiteResult").innerHTML=siteDetailsHtml(Number(q("adminSiteLookup").value))}
function staffSearchSite(){q("staffSiteResult").innerHTML=siteDetailsHtml(Number(q("staffSiteLookup").value))}
function staffPinSearchSite(){q("staffPinSiteResult").innerHTML=staffPinResetResult(Number(q("staffPinSiteLookup").value))}
function adminAuditSearch(){let filters={site:q("adminAuditSite")?.value||"",action:q("adminAuditAction")?.value||"",actor:q("adminAuditActor")?.value||"",details:q("adminAuditDetails")?.value||""};q("adminAuditResult").innerHTML=auditSearchResults(filters)}

function assignRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid), who=actor?.username||"Staff";if(!r)return alert("Request not found.");if(r.status!=="open")return alert("Only open requests can be assigned.");if(r.assignedTo)return toast(`Already assigned to ${r.assignedTo}`);r.assignedTo=who;r.assignedAt=now();let line=assignmentLine(who);r.notes=r.notes?`${r.notes}\n${line}`:line;stampRecord(r);audit("Assigned request",`${r.service} / site ${r.site} / ${who}`);save();syncRequest(cg.id,r);toast("Request assigned");role==="admin"?renderAdmin():renderStaff()}
function completeRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="closed";r.closedAt=now();r.closedDate=dateKey();r.completedBy=actor?.username||"Staff";stampRecord(r);audit("Completed request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}staffRequestId=null;save();role==="admin"?renderAdmin():renderStaff()}
function cancelRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="canceled";r.closedAt=now();r.closedDate=dateKey();r.completedBy=actor?.username||"Staff";stampRecord(r);audit("Canceled request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}staffRequestId=null;save();role==="admin"?renderAdmin():renderStaff()}
function reopenRequest(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(r){r.status="open";r.reopenedAt=now();r.reopenedBy=actor?.username||"Staff";delete r.closedAt;delete r.closedDate;delete r.completedBy;stampRecord(r);audit("Reopened request",`${r.service} / site ${r.site}`);syncRequest(cg.id,r)}save();toast("Ticket reopened");role==="admin"?renderAdmin():renderStaff()}
function updateRequestNotes(rid){let cg=getCg(), r=cg.requests.find(x=>x.id===rid);if(!r)return alert("Request not found.");r.notes=q("staffRequestNotes")?.value.trim()||"";stampRecord(r);audit("Updated request notes",`${r.service} / site ${r.site}`);save();syncRequest(cg.id,r);toast("Notes updated");role==="admin"?renderAdmin():renderStaff()}
function staffSavePin(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber), p=pin(q("staffResetPin")?.value);if(!c)return alert("Site not found.");if(p.length!==4)return alert("4 digit PIN required.");c.pin=p;stampRecord(c);audit("Staff reset camper PIN",`Site ${siteNumber}: ${c.name}`);save();syncCampgroundSub(cg.id,"campers",c);toast("PIN updated");staffPinSearchSite()}
function appendTemplate(rid){let r=getCg().requests.find(x=>x.id===rid), text=q("staffTemplate")?.value;if(!r||!text)return toast("Choose a template first");let notes=q("staffRequestNotes");notes.value=notes.value?`${notes.value}\n${text}`:text}
function saveAnnouncement(){let cg=getCg();cg.announcement=q("adminAnnouncement")?.value||"";stampRecord(cg);audit("Updated announcement",cg.announcement?cg.announcement.slice(0,80):"Cleared");save();syncCampground(cg);toast("Announcement updated");renderAdmin()}
function clearAnnouncement(){let cg=getCg();cg.announcement="";stampRecord(cg);audit("Updated announcement","Cleared");save();syncCampground(cg);toast("Announcement cleared");renderAdmin()}
function saveTemplates(){let cg=getCg();cg.requestTemplates=(q("requestTemplates")?.value||"").split("\n").map(x=>x.trim()).filter(Boolean);stampRecord(cg);audit("Updated request templates",`${cg.requestTemplates.length} templates`);save();syncCampground(cg);toast("Templates saved");renderAdmin()}
function saveTheme(){let cg=getCg(), theme={};Object.keys(DEFAULT_THEME).forEach(k=>theme[k]=q("theme-"+k)?.value||DEFAULT_THEME[k]);cg.theme=normalizeTheme(theme);stampRecord(cg);audit("Updated theme colors",cg.name);save();syncCampground(cg);applyTheme(cg);toast("Theme saved");renderAdmin()}
function saveSite(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber), name=q("editSiteName")?.value.trim(), p=pin(q("editSitePin")?.value);if(!name||p.length!==4)return alert("Name and 4 digit PIN required.");if(!validCamperName(name))return;c.name=name;c.pin=p;stampRecord(c);audit("Updated site account",`Site ${siteNumber}: ${name}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function resetSitePin(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);c.pin=randomPin(new Set(cg.campers.filter(x=>x.site!==siteNumber).map(x=>x.pin)));stampRecord(c);audit("Reset site PIN",`Site ${siteNumber}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function resetSiteName(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);c.name="Site "+siteNumber;stampRecord(c);cg.requests.forEach(r=>{if(r.site===siteNumber){r.name=c.name;stampRecord(r);syncRequest(cg.id,r)}});audit("Reset site name",`Site ${siteNumber}`);save();syncCampgroundSub(cg.id,"campers",c);adminSearchSite()}
function toggleSiteRequests(siteNumber){let cg=getCg(), c=cg.campers.find(x=>x.site===siteNumber);if(!c)return alert("Site not found.");c.serviceDisabled=!c.serviceDisabled;stampRecord(c);audit(c.serviceDisabled?"Disabled site requests":"Enabled site requests",`Site ${siteNumber}: ${c.name}`);save();syncCampgroundSub(cg.id,"campers",c);toast(c.serviceDisabled?"Service requests disabled":"Service requests enabled");adminSearchSite()}
function addStaff(){let cg=getCg(), u=q("newStaffUser").value.trim(), p=pin(q("newStaffPin").value);if(!u||p.length!==4)return alert("Username and PIN required.");if(cg.staff.some(s=>norm(s.username)===norm(u)))return alert("Username exists.");let staff=ensureRecordMeta({id:id(),username:u,pin:p,active:true});cg.staff.push(staff);audit("Added staff",u);save();syncCampgroundSub(cg.id,"staff",staff);renderAdmin()}
function activeServiceCount(){return getCg().services.filter(s=>s.active).length}
function addService(){let cg=getCg(), name=q("newServiceName").value.trim(), icon=(q("newServiceIcon").value.trim()||"🔧");if(!name)return alert("Service name required.");if(cg.services.some(s=>norm(s.name)===norm(name)))return alert("Service already exists.");normalizeServiceOrder(cg);let service=ensureRecordMeta({id:id(),name,icon,active:true,sortOrder:cg.services.length});cg.services.push(service);audit("Added service",name);save();syncCampgroundSub(cg.id,"services",service);toast("Service added");renderAdmin()}
function setServiceIcon(targetId,icon){let el=q(targetId), btn=q(targetId+"Btn");if(el){el.value=icon;if(btn)btn.textContent=icon;closeIconPicker()}}
function saveService(i){let cg=getCg(), s=cg.services[Number(i)], name=q("serviceName"+i)?.value.trim(), icon=q("serviceIcon"+i)?.value.trim()||"🔧";if(!s)return;if(!name)return alert("Service name required.");if(cg.services.some((x,idx)=>idx!==Number(i)&&norm(x.name)===norm(name)))return alert("Service already exists.");let old=s.name;s.name=name;s.icon=icon;stampRecord(s);if(selectedService===old)selectedService=name;audit("Updated service",`${old} -> ${name}`);save();syncCampgroundSub(cg.id,"services",s);toast("Service updated");renderAdmin()}
function toggleService(i){let s=getCg().services[Number(i)];if(!s)return;if(s.active&&activeServiceCount()<=1)return alert("Keep at least one active service.");s.active=!s.active;stampRecord(s);if(!s.active&&selectedService===s.name)selectedService="";audit(s.active?"Enabled service":"Disabled service",s.name);save();syncCampgroundSub(getCg().id,"services",s);renderAdmin()}
function deleteService(i){let cg=getCg(), s=cg.services[Number(i)];if(!s)return;if(s.active&&activeServiceCount()<=1)return alert("Keep at least one active service.");if(!confirm(`Delete service ${s.name}? Existing request history will keep its service name.`))return;softDeleteRecord(s);syncCampgroundSub(cg.id,"services",s);cg.services.splice(Number(i),1);normalizeServiceOrder(cg);cg.services.forEach(x=>{stampRecord(x);syncCampgroundSub(cg.id,"services",x)});if(selectedService===s.name)selectedService="";audit("Deleted service",s.name);saveLocalOnly();toast("Service deleted");renderAdmin()}
function moveService(i,dir){let cg=getCg(), from=Number(i), to=from+Number(dir);normalizeServiceOrder(cg);if(to<0||to>=cg.services.length)return;[cg.services[from],cg.services[to]]=[cg.services[to],cg.services[from]];assignServiceOrder(cg);let moved=[cg.services[from],cg.services[to]].filter(Boolean);moved.forEach(s=>{s.lastUpdatedAt=Date.now();s.lastUpdatedBy=actor?.username||actor?.name||"System";syncServiceOrder(cg.id,s)});audit("Reordered services",cg.services.map(s=>s.name).join(", "));saveLocalOnly();toast("Service moved");renderAdmin()}
function addAdmin(){let cg=getCg(), u=q("newAdminUser").value.trim(), p=pin(q("newAdminPin").value);if(!u||p.length!==4)return alert("Username and PIN required.");if(cg.admins.some(a=>norm(a.username)===norm(u)))return alert("Username exists.");let admin=ensureRecordMeta({id:id(),username:u,pin:p,active:true});cg.admins.push(admin);audit("Added admin",u);save();syncCampgroundSub(cg.id,"admins",admin);renderAdmin()}
function toggleStaff(i){let s=getCg().staff[Number(i)];s.active=!s.active;stampRecord(s);audit(s.active?"Enabled staff":"Disabled staff",s.username);save();syncCampgroundSub(getCg().id,"staff",s);renderAdmin()}
function deleteStaff(i){let cg=getCg(), s=cg.staff[Number(i)];softDeleteRecord(s);syncCampgroundSub(cg.id,"staff",s);cg.staff.splice(Number(i),1);audit("Deleted staff",s.username);saveLocalOnly();renderAdmin()}
function activeAdminCount(){return getCg().admins.filter(a=>a.active).length}
function toggleAdmin(i){let a=getCg().admins[Number(i)];if(a.active&&activeAdminCount()<=1)return alert("Keep at least one active admin.");a.active=!a.active;stampRecord(a);audit(a.active?"Enabled admin":"Disabled admin",a.username);save();syncCampgroundSub(getCg().id,"admins",a);renderAdmin()}
function deleteAdmin(i){let cg=getCg(), a=cg.admins[Number(i)];if(a.active&&activeAdminCount()<=1)return alert("Keep at least one active admin.");softDeleteRecord(a);syncCampgroundSub(cg.id,"admins",a);cg.admins.splice(Number(i),1);audit("Deleted admin",a.username);saveLocalOnly();renderAdmin()}

function renderOwner(){app.innerHTML=`<section class="card"><h3>Owner</h3><p class="tiny">Add and manage campgrounds. Campground admins and staff only see their assigned campground.</p></section><div class="tabs"><button class="tab ${ownerTab==="campgrounds"?"active":""}" data-action="owner-tab" data-tab="campgrounds">Campgrounds</button><button class="tab ${ownerTab==="owners"?"active":""}" data-action="owner-tab" data-tab="owners">Owners</button><button class="tab ${ownerTab==="exports"?"active":""}" data-action="owner-tab" data-tab="exports">Exports</button></div>${ownerTab==="campgrounds"?ownerCampgroundsTab():ownerTab==="owners"?ownerAccountsTab():ownerExportsTab()}`}
function ownerCampgroundsTab(){return`<section class="card grid"><h3>Add Campground</h3><input id="newCgName" placeholder="Campground name"><input id="newCgSites" inputmode="numeric" placeholder="Number of sites, e.g. 400"><button data-action="add-campground">Add Campground</button>${state.campgrounds.map(ownerCampgroundRow).join("")}</section>`}
function ownerCampgroundRow(c){return`<div class="soft grid"><div class="split"><b>${esc(c.name)}</b><button class="danger" data-action="delete-campground" data-id="${esc(c.id)}" style="width:auto">Remove</button></div><p class="tiny">${c.siteCount} sites · ${c.admins.length} admins · ${c.staff.length} staff · ${c.requests.length} requests</p><div class="grid2"><div class="field"><label>Site Count</label><input id="ownerSiteCount-${esc(c.id)}" inputmode="numeric" value="${esc(c.siteCount)}"></div><div class="field"><label>&nbsp;</label><button class="btn2" data-action="owner-update-sites" data-id="${esc(c.id)}">Update Sites</button></div></div><div class="grid2"><div class="field"><label>Admin Username</label><input id="ownerAdminUser-${esc(c.id)}" placeholder="${c.admins.length?"Add another admin":"First admin username"}"></div><div class="field"><label>4 Digit PIN</label><input id="ownerAdminPin-${esc(c.id)}" inputmode="numeric" maxlength="4"></div></div><button class="btn2" data-action="owner-add-admin" data-id="${esc(c.id)}">${c.admins.length?"Add Admin":"Add First Admin"}</button>${c.admins.length?`<p class="tiny">Admins: ${c.admins.map(a=>esc(a.username)).join(", ")}</p>`:`<p class="tiny">No admin yet. Add one so this campground can be managed.</p>`}</div>`}
function ownerAccountsTab(){return`<section class="card grid"><h3>Add Owner</h3><div class="field"><label>Username</label><input id="newOwnerUser" placeholder="owner username"></div><div class="field"><label>4 Digit PIN</label><input id="newOwnerPin" inputmode="numeric" maxlength="4"></div><button data-action="add-owner">Add Owner</button>${state.owners.map((o,i)=>`<div class="soft grid"><div class="split"><b>${esc(o.username)}</b><span class="badge ${o.active?"open":"closed"}">${o.active?"Active":"Disabled"}</span></div><div class="field"><label>PIN</label><input id="ownerPin${i}" inputmode="numeric" maxlength="4" value="${esc(o.pin)}"></div><div class="row"><button class="btn2" data-action="save-owner-pin" data-index="${i}">Save PIN</button><button class="btn2" data-action="toggle-owner" data-index="${i}">${o.active?"Disable":"Enable"}</button><button class="danger" data-action="delete-owner" data-index="${i}">Delete</button></div></div>`).join("")}</section>`}
function ownerExportsTab(){return`<section class="card grid"><h3>Exports</h3><button class="btn2" data-action="export-owner-summary">Export All Campgrounds Summary CSV</button><button class="btn2" data-action="export-owner-audit">Export Owner Audit CSV</button></section>`}
function addCampground(){let name=q("newCgName").value.trim(), sites=Number(q("newCgSites").value)||400;if(!name)return alert("Campground name required.");if(state.campgrounds.some(c=>norm(c.name)===norm(name)))return alert("Campground already exists.");let cg=ensureMetaForData({campgrounds:[makeCampground(name,sites)]}).campgrounds[0];state.campgrounds.push(cg);ownerAudit("Added campground",`${name} / ${sites} sites`);save();syncFullCampground(cg);toast("Campground added");renderOwner()}
function deleteCampground(cgId){if(state.campgrounds.length<=1)return alert("Keep at least one campground.");let cg=state.campgrounds.find(c=>c.id===cgId);if(!cg)return;if(!confirm(`Remove ${cg.name}? This deletes its sites, staff, admins, requests, and audit log from this device.`))return;ownerAudit("Soft-deleted campground",`${cg.name} / ${cg.siteCount} sites / ${cg.requests.length} requests`);softDeleteRecord(cg);syncCampground(cg);state.campgrounds=state.campgrounds.filter(c=>c.id!==cgId);if(campgroundId===cgId)campgroundId=null;saveLocalOnly();toast("Campground removed");renderOwner()}
function ownerUpdateSites(cgId){let cg=state.campgrounds.find(c=>c.id===cgId), next=Math.floor(Number(q("ownerSiteCount-"+cgId)?.value));if(!cg)return;if(!next||next<1)return alert("Enter at least 1 site.");let old=cg.siteCount;if(next===old)return toast("Site count unchanged");if(next<old&&!confirm(`Reduce ${cg.name} from ${old} sites to ${next}? Sites ${next+1} through ${old} will be removed.`))return;let used=new Set(cg.campers.map(x=>x.pin).filter(Boolean)), removedCampers=[], removedRequests=[];if(next>old){for(let i=old+1;i<=next;i++)if(!cg.campers.some(x=>x.site===i)){let camper=ensureRecordMeta({site:i,name:"Site "+i,pin:randomPin(used),active:true,serviceDisabled:false});cg.campers.push(camper);syncCampgroundSub(cg.id,"campers",camper)}}else{removedCampers=cg.campers.filter(c=>c.site>next);removedRequests=cg.requests.filter(r=>Number(r.site)>next);removedCampers.forEach(c=>{softDeleteRecord(c);syncCampgroundSub(cg.id,"campers",c)});removedRequests.forEach(r=>{softDeleteRecord(r);syncRequest(cg.id,r)});cg.campers=cg.campers.filter(c=>c.site<=next);cg.requests=cg.requests.filter(r=>Number(r.site)<=next)}cg.siteCount=next;stampRecord(cg);cg.campers.sort((a,b)=>a.site-b.site);let auditItem=ensureRecordMeta({id:id(),at:now(),actor:actor?.username||"Owner",action:"Updated site count",details:`${old} -> ${next}`,active:true});cg.audit.unshift(auditItem);ownerAudit("Updated campground site count",`${cg.name}: ${old} -> ${next}`);save();syncCampground(cg);syncAudit(cg.id,auditItem);toast("Site count updated");renderOwner()}
function ownerAddAdmin(cgId){let cg=state.campgrounds.find(c=>c.id===cgId), u=q("ownerAdminUser-"+cgId)?.value.trim(), p=pin(q("ownerAdminPin-"+cgId)?.value);if(!cg)return;if(!u||p.length!==4)return alert("Admin username and 4 digit PIN required.");if(cg.admins.some(a=>norm(a.username)===norm(u)))return alert("Admin username exists for this campground.");let admin=ensureRecordMeta({id:id(),username:u,pin:p,active:true}), auditItem=ensureRecordMeta({id:id(),at:now(),actor:actor?.username||"Owner",action:"Added admin",details:u,active:true});cg.admins.push(admin);cg.audit.unshift(auditItem);ownerAudit("Owner added campground admin",`${cg.name} / ${u}`);save();syncCampgroundSub(cg.id,"admins",admin);syncAudit(cg.id,auditItem);toast(cg.admins.length===1?"First admin added":"Admin added");renderOwner()}
function activeOwnerCount(){return state.owners.filter(o=>o.active).length}
function addOwner(){let u=q("newOwnerUser").value.trim(), p=pin(q("newOwnerPin").value);if(!u||p.length!==4)return alert("Username and 4 digit PIN required.");if(state.owners.some(o=>norm(o.username)===norm(u)))return alert("Owner username exists.");let owner=ensureRecordMeta({id:id(),username:u,pin:p,active:true});state.owners.push(owner);ownerAudit("Added owner",u);save();syncOwner(owner);toast("Owner added");renderOwner()}
function saveOwnerPin(i){let o=state.owners[Number(i)], p=pin(q("ownerPin"+i)?.value);if(!o||p.length!==4)return alert("4 digit PIN required.");o.pin=p;stampRecord(o);ownerAudit("Updated owner PIN",o.username);save();syncOwner(o);toast("Owner PIN updated");renderOwner()}
function toggleOwner(i){let o=state.owners[Number(i)];if(!o)return;if(o.active&&activeOwnerCount()<=1)return alert("Keep at least one active owner.");o.active=!o.active;stampRecord(o);ownerAudit(o.active?"Enabled owner":"Disabled owner",o.username);save();syncOwner(o);toast(o.active?"Owner enabled":"Owner disabled");renderOwner()}
function deleteOwner(i){let o=state.owners[Number(i)];if(!o)return;if(o.active&&activeOwnerCount()<=1)return alert("Keep at least one active owner.");if(actor&&norm(actor.username)===norm(o.username))return alert("You cannot delete the owner account you are using.");softDeleteRecord(o);syncOwner(o);ownerAudit("Deleted owner",o.username);state.owners.splice(Number(i),1);state.owner=state.owners[0];saveLocalOnly();toast("Owner deleted");renderOwner()}
function exportOwnerSummary(){ownerAudit("Exported owner summary","All campgrounds summary CSV");let rows=[["Campground","Sites","Open Requests","Total Requests","Admins","Staff"]];state.campgrounds.forEach(c=>rows.push([c.name,c.siteCount,c.requests.filter(r=>r.status==="open").length,c.requests.length,c.admins.length,c.staff.length]));download("campconnect-all-campgrounds-summary.csv",csv(rows),"text/csv")}
function exportOwnerAudit(){let rows=[["Date","Actor","Role","Action","Details"],...state.ownerAudit.map(a=>[a.at,a.actor,a.role,a.action,a.details])];ownerAudit("Exported owner audit","Owner audit CSV");download("campconnect-owner-audit.csv",csv(rows),"text/csv")}

function exportAudit(){let cg=getCg(), rows=[["Date","Actor","Action","Details"],...cg.audit.map(a=>[a.at,a.actor,a.action,a.details])];ownerAudit("Exported campground audit",cg.name);download(`${cg.name}-audit.csv`,csv(rows),"text/csv")}
function exportSitePins(){let cg=getCg(), rows=[["Campground","Site Number","Camper Name","PIN","Active"],...cg.campers.map(c=>[cg.name,c.site,c.name,c.pin,c.active===false?"No":"Yes"])];ownerAudit("Exported site PINs",cg.name);download(`${cg.name}-site-pins.csv`,csv(rows),"text/csv")}
function exportAnalytics(){let cg=getCg(), rows=[["Campground","Section","Name","Value"],[cg.name,"Summary","Open Requests",openRequests(cg).length],[cg.name,"Summary","Total Requests",cg.requests.length],...groupCount(cg.requests,r=>r.service).map(x=>[cg.name,"Services",x[0],x[1]])];ownerAudit("Exported analytics",cg.name);download(`${cg.name}-analytics.csv`,csv(rows),"text/csv")}
function csv(rows){return rows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n")}
function download(name,content,type){let blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}

app.addEventListener("click",e=>{let target=e.target.closest("[data-action]");if(!target)return;let a=target.dataset.action;if(a==="camper-login")doCamperLogin();if(a==="staff-login")doStaffLogin();if(a==="admin-login")doAdminLogin();if(a==="owner-login")doOwnerLogin();if(a==="logout")setRole("home");if(a==="camper-tab"){camperTab=target.dataset.tab;saveSession();renderCamper();scrollTopNow()}if(a==="select-service"){selectedService=target.dataset.service;saveSession();renderCamper()}if(a==="submit-request")submitRequest();if(a==="save-camper-account")saveCamperAccount();if(a==="clear-camper-theme")clearCamperTheme();if(a==="staff-tab"){staffTab=target.dataset.tab;staffRequestId=null;if(staffTab==="messages")markMessagesRead(true);saveSession();role==="admin"?renderAdmin():renderStaff()}if(a==="admin-tab"){adminTab=target.dataset.tab;staffRequestId=null;if(adminTab==="messages")markMessagesRead(true);saveSession();renderAdmin()}if(a==="admin-requests-back"){adminTab="sites";staffRequestId=null;saveSession();renderAdmin();scrollTopNow()}if(a==="owner-tab"){ownerTab=target.dataset.tab;saveSession();renderOwner()}if(a==="open-request"){staffRequestId=target.dataset.id;saveSession();role==="admin"?renderAdmin():renderStaff();scrollTopNow()}if(a==="back-requests"){staffRequestId=null;saveSession();role==="admin"?renderAdmin():renderStaff()}if(a==="send-team-message")sendTeamMessage();if(a==="clear-team-messages")clearTeamMessages();if(a==="assign-request")assignRequest(target.dataset.id);if(a==="append-template")appendTemplate(target.dataset.id);if(a==="update-request-notes")updateRequestNotes(target.dataset.id);if(a==="reopen-request")reopenRequest(target.dataset.id);if(a==="save-announcement")saveAnnouncement();if(a==="clear-announcement")clearAnnouncement();if(a==="save-templates")saveTemplates();if(a==="save-theme")saveTheme();if(a==="backup-data")backupData();if(a==="staff-site-search")staffSearchSite();if(a==="staff-pin-site-search")staffPinSearchSite();if(a==="staff-save-pin")staffSavePin(Number(target.dataset.site));if(a==="admin-site-search")adminSearchSite();if(a==="admin-audit-filter")adminAuditSearch();if(a==="complete-request")completeRequest(target.dataset.id);if(a==="cancel-request")cancelRequest(target.dataset.id);if(a==="save-site")saveSite(Number(target.dataset.site));if(a==="reset-pin")resetSitePin(Number(target.dataset.site));if(a==="reset-name")resetSiteName(Number(target.dataset.site));if(a==="toggle-site-requests")toggleSiteRequests(Number(target.dataset.site));if(a==="add-staff")addStaff();if(a==="add-service")addService();if(a==="open-icon-picker")openIconPicker(target.dataset.target);if(a==="save-service")saveService(target.dataset.index);if(a==="toggle-service")toggleService(target.dataset.index);if(a==="move-service-up")moveService(target.dataset.index,-1);if(a==="move-service-down")moveService(target.dataset.index,1);if(a==="delete-service")deleteService(target.dataset.index);if(a==="add-admin")addAdmin();if(a==="toggle-staff")toggleStaff(target.dataset.index);if(a==="delete-staff")deleteStaff(target.dataset.index);if(a==="toggle-admin")toggleAdmin(target.dataset.index);if(a==="delete-admin")deleteAdmin(target.dataset.index);if(a==="add-campground")addCampground();if(a==="delete-campground")deleteCampground(target.dataset.id);if(a==="owner-update-sites")ownerUpdateSites(target.dataset.id);if(a==="owner-add-admin")ownerAddAdmin(target.dataset.id);if(a==="add-owner")addOwner();if(a==="save-owner-pin")saveOwnerPin(target.dataset.index);if(a==="toggle-owner")toggleOwner(target.dataset.index);if(a==="delete-owner")deleteOwner(target.dataset.index);if(a==="export-owner-summary")exportOwnerSummary();if(a==="export-owner-audit")exportOwnerAudit();if(a==="export-audit")exportAudit();if(a==="export-site-pins")exportSitePins();if(a==="export-analytics")exportAnalytics()});
app.addEventListener("input",e=>{if(["pinInput","staffPin","adminPin","newOwnerPin","newStaffPin","newAdminPin","editSitePin","camperAccountPin","staffResetPin"].includes(e.target.id)||/^ownerPin\d+$/.test(e.target.id)||/^ownerAdminPin-/.test(e.target.id))e.target.value=pin(e.target.value);if(/^theme-/.test(e.target.id)){let theme={};Object.keys(DEFAULT_THEME).forEach(k=>theme[k]=q("theme-"+k)?.value||DEFAULT_THEME[k]);applyTheme({theme});let pack=q("themePack");if(pack)pack.value=""}});
app.addEventListener("change",e=>{if(e.target.id==="themePack")applyThemePack(e.target.value);if(e.target.id==="camperThemePack")saveCamperThemePack(e.target.value)});
ownerLoginModal.addEventListener("input",e=>{if(e.target.id==="ownerPin")e.target.value=pin(e.target.value)});
function setupPWA(){if("serviceWorker"in navigator&&location.protocol!=="file:")navigator.serviceWorker.register("./service-worker.js").catch(()=>{});window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("installBar").classList.add("show")});document.getElementById("installBtn").onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}document.getElementById("installBar").classList.remove("show")};document.getElementById("dismissInstall").onclick=()=>document.getElementById("installBar").classList.remove("show")}
setupPWA();if(restoreSession())render();else render();startFirebaseSync();
})();
